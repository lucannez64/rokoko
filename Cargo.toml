[package]
name = "cowboys-and-aliens"
version = "0.1.0"
edition = "2021"

[dependencies]
criterion = "0.7.0"
num = "0.4.3"
rand = "0.9.2"
blake3 = "1.5.1"

[profile.dev]
opt-level = 3

[profile.release]
opt-level = 3
debug = false

[profile.bench]
opt-level = 3         # full optimizations (default)
debug = false         # no debug symbols
overflow-checks = false

[[bench]]
name = "bench"
harness = false
